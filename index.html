<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <!-- Add your site or application content here -->
  <div class="container">
    <h1>Clicky Game</h1>
    <p>This is a mini game project.</p>
    <div>
      <p>Score: <span id="scoreDisplay">0</span></p>
      <p>Time Left: <span id="timerDisplay">60</span>s</p>
    </div>
    <button id="button1">Click Me</button>
    <label id="label1" for="name">Submit Your Name:</label>
    <input
      type="text"
      id="name"
      name="name"
      required
      minlength="4"
      maxlength="8"
      size="10" />
    <button id="button2">Submit High Score</button>
  </div>

  <!-- Scoreboard Section -->
  <div class="scoreboard-container">
    <h2>Top 10 High Scores</h2>
    <table class="scoreboard-table" id="scoreboardTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="scoreboardBody">
        <!-- Scoreboard data will be populated here -->
      </tbody>
    </table>
  </div>
  <script src="js/app.js" type="module"></script>

</body>

</html>
